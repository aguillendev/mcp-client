spring:
  threads:
    virtual:
      enabled: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini   # opciones: gpt-4o-mini | gpt-4o | gpt-4-turbo | gpt-3.5-turbo
          proxy-tool-calls: false
    mcp:
      client:
        sse:
          connections:
            playmatch-server:
              url: http://localhost:8081
              # sse-endpoint: /sse   # /sse es el default, no es necesario declararlo

server:
  port: 8082
